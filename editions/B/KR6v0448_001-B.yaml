body:
  text: 東大寺沙門凝然述夫毗盧遮那釋迦世尊本則非古非今離待對於思議之門迹則能今能久開救攝於機感之路迦毗羅城示降誕之迹摩訶陀國顯果極之德道樹祇林飾七處九會之嘉運仙苑提河播三衍一實之宏儀法門八萬隨應宜緣教迹十二契會體義畢波之窟三藏分路鐵圍之洞二諦異衢眾聖應時降臨諸賢託緣出現西天弘大小之法東土敷權實之教故覺母文殊送四百五十之年序補處彌勒有九百餘歲之降下各弘佛世之親聞俱傳實道之契範迦多衍那立八犍之章訶梨跋摩分四諦之段三論是正觀之幽旨五論乃中實之玄奧出現南天造之降下中印說之十八五百小宗之諍論二十三十大乘之唯識龍軍堅慧演深奧之義馬鳴無性立卓朗之宗東邦弘通專守印度之軌範西國流演要思震旦之洽潤教法傳通普遍為心諸國非一眾域悉布連陸之嶮境隔海之群土任那百濟皆傳梵天之教新羅高麗俱飡印度之宗五印封壃各有邊國皆弘佛法建興真俗具陳事迹難知難言且就三國示傳法迹一明天竺宗源二陳震旦傳法三述日域弘通廣相難述略舉塵露天竺佛法傳通如來是開法之大師餘人乃稟教之助化如來成道第二七日說華嚴經小乘六七日等後說四諦等法成道二年度五比丘三年度三迦葉及千比丘四年在象頭山為龍鬼說法五年度舍利弗目蓮及二百五十弟子舍利弗七日得羅漢目連十五日得羅漢六年建祇洹精舍七年為婆陀和菩薩等八人說一卷般舟經如是十二年一一明說法相十二遊經第十二年時佛還父王國中本起經六年時還十二年中說四諦教三十年中說般若經四十年後八箇年說法華或五年說十六年時說維摩經菩提留支云成道五年說大般若云云十六年時說大集經第十年時說如來藏經二十八年說瓔珞經二十九年說摩訶般若金剛般若天王問般若光讚般若三十八年說解深密經四十二年說觀無量壽經與法華初集同年觀經猶前於圓寂時說涅槃經如來一期四十九年隨緣制戒隨宜說教前後森羅佛滅度後眾聖結集分大小異開五乘別如來滅後五師持法各二十年優婆毱多時橫分五宗二百餘年大眾部中分出九部三百餘年至四百滿上座部中分十一部本末合成為二十部根本二部百年時分此是小乘諸部分派如來以律付優婆離自爾已後次第傳付僧祇律中列二十七人善見論中列二十四人善見論七百年時造二百三十六年師子國中佛法流傳如來滅後一百年中提婆設摩羅漢造識身足論三百年初尊者世友造品類足論三百年中迦旃延子造發智論三百年末世友造界身足論四百年時五百羅漢造婆沙論九百年時達磨多羅造雜心論六百年時馬鳴菩薩造起信論等七百年時龍樹菩薩造大無畏論中論十二門論智度論等堅慧菩薩七百年時造法界無差別論九百年時世親菩薩造俱舍論眾賢論師造順正理論顯宗論世親菩薩三十頌等諸論皆此時造其後十大論師各釋三十唯識華嚴法華龍樹誦傳無著菩薩造攝大乘本論無性天親各作解釋天親菩薩造淨土論解釋三經又造十地論釋華嚴十地品龍猛菩薩初開鐵塔值金剛薩埵受法灌頂大弘真言教龍智菩薩傳受流布久住世間大利後代自餘諸教流布五印廣多無量難可具陳震旦所弘一十三宗皆以天竺所弘為本毗曇俱舍依天竺諸毘曇等成實論宗即依訶梨跋摩律宗即依五師傳持三論即依龍樹提婆涅槃宗即依本經地論宗依十地經十地論淨土是依三經一論禪法達磨以心傳心迦葉阿難等二十八祖傳正法眼藏攝論宗即依無著世親本釋二論天台宗即依法華建立圓頓一乘華嚴宗即依三部華嚴十地論等法相宗依解深密經瑜伽論等真言秘宗即依內證真說三部密藏本經儀軌等如是諸宗皆有所依經論等教依此立宗義理極成行用可軌化益無窮震旦佛法傳通如來滅後一千十六年佛法傳漢地翻譯弘通自爾已後諸教漸傳隨譯依行講敷流演或從西土傳之或於此國立義皆以佛經為本據以西天論為所憑漸次弘傳遐世繁興摠有十三宗則漸漸流傳一毗曇宗二成實宗三律宗四三論宗五涅槃宗六地論宗七淨土宗八禪宗九攝論宗十天台宗十一華嚴宗十二法相宗十三真言宗上來所列多依興起弘傳講敷次第舉之毗曇宗夫毗曇宗者是薩婆多部如來滅後三百年初上座部中離分立異後後分離皆從此出若約本源如來滅後一百年時第五傳法優婆毱多下橫分五部薩婆多部即其一也三百年初薩婆多者是後分部取百年時薩婆多名義同彼故如雜心法救取婆沙法救三百年初者指滿三百年時言初如來滅後三百餘年迦多衍尼子大阿羅漢造阿毗曇八犍度論苻秦僧伽提婆共竺佛念譯為二十卷與唐朝玄奘所譯發智論二十卷是同本也如來滅後四百年時舊云六百年間五百羅漢造大毗婆沙釋發智論玄奘譯之為二百卷昔北涼天竺浮陀跋摩譯為百卷號舊婆沙兵火所燒六十卷存解三犍度七百年時法勝羅漢嫌婆沙太博略撰要義作二百五十偈名阿毗曇心譯成四卷世號法勝毗曇東晉瞿曇僧伽譯又有法勝阿毗曇心論六卷優婆扇多造為利弟子於法勝論加增義理高齊那連提耶舍共法智譯千年之間達磨多羅尊者以婆沙太博四卷極略更撰三百五十偈足前四卷合六百偈名為雜心有十一卷宋代僧伽跋摩譯眾事分阿毗曇十二卷宋天竺三藏求那跋陀羅譯與玄奘所譯品類足論同本異譯甘露味阿毗曇二卷尊者瞿沙造曹魏代譯失譯人名薩婆多宗根本有七發智本論為身以六足論為足言六足者一集異門足論舍利弗造有二十卷二法薀足論十二卷大目犍連造三施設足論迦多衍那子造其論未譯上三足論竝佛世時造四識身足論十六卷佛滅百年提婆設魔羅漢造五品類足論十八卷筏蘇密多羅唐云世友造六界身足論三卷亦世友造上二竝佛滅三百年中造五事毗婆沙論二卷尊者法救造如來滅後九百餘年世親菩薩造俱舍論梵本九千頌玄奘三藏譯為三十卷與陳真諦三藏舊譯俱舍論二十二卷同本異譯順正理論八十卷眾賢論師造破俱舍義顯宗論四十卷眾賢論師造直顯有宗正義毘曇薩婆多宗論藏東流分齊部數如是依學此等諸論名毗曇宗然大唐代貞觀已前學舊毗曇玄奘新譯已後專學新翻諸論俱舍為本兼學發智六足毗婆沙等罄薩婆多幽旨俱舍為門名俱舍宗俱舍論主顯雖辨明薩婆多義而密經部所立為善未必婆沙評家為本隨自所好取捨造論諸師多釋新俱舍論普光法寶神泰圓睴等師是也新譯有宗皆玄奘三藏翻所傳也三千門人七十達者服膺鑽仰大唐一均無不習學昔東晉第九主孝武帝諱曜太元十六年辛卯北天竺罽賓國瞿曇僧伽提婆晉云眾天創譯法勝毗曇四卷此即東夏毗曇宗之初也當日本國人王第十七代仁德天皇七十九年辛卯自爾已來迦延毗曇八犍度論雜心毗曇優婆扇多六卷心論舊毗婆沙舊俱舍等數朝漸譯諸師各講相承弘通橫竪甚昌唐朝新譯有宗諸論大小十部傳譯詳悉舉世講敷造䟽述章諸師競學闌菊諍美成實宗夫成實論者如來滅後八百九十年罽賓國小乘薩婆多宗英學之匠鳩摩羅陀上足弟子中天竺國婆羅門子訶梨跋摩此云師子鎧之所造也跋摩本是數論外道苗裔學者弘彼宗法所計堅強後棄邪出家即學有部宗然彼跋摩慨羅陀所宗近在名相意致未玄遂從轍僧祇兼學大小鑽仰九經研究三藏二部五部貫統無遺二十五百包括罄旨道振罽賓聲流諸方造成實論弘其所宗二百二品十有六卷或二十卷四諦建章五聚明義印度翫之諸處學之昔姚秦弘始十三年辛亥當日本國人王第十九代反正天皇御宇六年辛亥羅什三藏初譯此論明年十四年九月十五日譯訖此依開元錄明若依南山大師內典錄云弘始八年譯成實論開元錄主智昇法師依成實論後記作此說也羅什譯論命僧叡令講之什公三千門人皆弘此論講敷研尋橫竪不絕即道生僧肇道融曇影慧觀道恒慧嚴僧標僧叡僧敦等是也厥後宋代僧導法師初作論䟽其門人僧音慧威竝善成論講敷弘通慧嚴弟子法智亦善成實道高法師作義䟽八卷齊僧鍾法師慧次法師梁三大法師謂光宅寺法雲開善寺智藏莊嚴寺慧旻龍光法師法安法師慧球法師僧淵智順法寵慧韶等講學弘通橫竪專昌成實論宗梁世盛翫陳世繼弘宣武寺洪偃法師彭城寺寶瓊法師白馬寺警韶法師栖霞寺慧布法師竝是陳世名哲各競弘持成論瓊公講成實論九十一遍撰玄義二十卷即講其義滿二十遍成論文䟽一十六卷通別解義無有所遺警公講論五十餘遍四方義學雲集奔波隋代慧暅法師靈裕法師智脫法師道莊法師等竝提義綱精研法綱至于唐朝者勝光寺道宗莊嚴寺保泰弘業寺道慶莊嚴寺慧日武丘山智琰法師等俱弘成論秉持攝化如來滅後經一千三百六十年至姚秦弘始十三年初譯成論次第弘傳橫竪繁昌唐朝中運已後講成實者漸少如來滅後九百年時彌勒菩薩降下中印說五部大論即是大乘甚深法相正是傳說佛在親聞爾前大乘法相未弘故龍樹等大乘論師建立法相專用小乘薩婆多等性相法數彌勒無著世親已後大乘論師即用大乘所說法相提婆堅慧等大論師等多守先䂓亦用小乘諸部法相震旦諸師唐朝玄奘歸朝已前竝用小乘所立法相三論天台涅槃宗等皆用有宗法數法門或諸師中具用成實論宗法相如梁三大法師等是貞觀年後法相一宗專弘自宗大乘深廣顯了法相華嚴一乘即用大乘法相法義兼用小乘如愚法小乘所說義是梁朝光宅大師日本國上宮王三經䟽中全用成實法相立義隨世所用法應爾故戒律宗如來滅後經一千十六年天竺佛法創傳震旦即後漢永平十年丁卯也其後摠經一百八十三年戒法未傳至曹魏嘉平二年庚午行十人受此時戒法初傳受行此是曇無德四分律宗所說戒體創所納得而其廣律未傳漢地厥後經一百五十五年至姚秦弘始六年甲辰譯十誦律是廣律初傳也次弘始十二年庚戌譯四分律此是如來滅後經一千三百五十九年此曇無德四分律宗廣律初傳當日本國反正天皇御宇五年庚戌此後漸次僧祇五分二律傳譯四分雖傳未廣講敷頻講餘律非是純一四分傳後經五十六年至元魏亦云北魏亦云後魏第六主文帝延興元年辛亥此年即當宋第六主明帝泰始七年并日本國人王第二十二代雄略天皇御宇十五年辛亥佛滅度後經一千四百二十年其後有北臺法聰律師本學僧祇開通精詳而考震嶺初受專以四分羯磨停講僧祇創講四分從此已後專弘四分或口以傳或章以授作四分䟽將二十家或立眾章或著諸鈔天下齊均地際平夷梁陳隋唐次第傳承普天率土橫竪弘敷各被世門俱沾時賓礪宣素三宗互諍其金玉鈔主要家峙立義鋒資持會正兩宗蘭菊昔姚秦弘始庚戌譯四分律已來東晉餘運有一十歲宋朝八主五十九年南齊五主二君二十三年梁朝四主五十六年陳朝五主三十三年隋朝三主三十七年唐朝二十主二百九十年唐朝之後五朝繼起一梁朝三主十六年其初年當日本國延喜七年丁卯二後唐三主十三年初年當日本國延長元年癸未三大晉三主十一年當日本國朱雀天皇御宇承平六年丙申已後四漢朝二主四年當日本國村上天皇御宇天曆元年丁未已後五周朝三主九年當日本國天曆五年辛亥大宋朝初當日本國天德四年庚申入宋朝後經三百十三年至第十五主慶宗皇帝咸淳十年甲戌此數代中律法昌行包攝該括講通開敷師資相繼橫竪弘傳然咸淳八年壬申德祐改元而復咸淳此年蒙古伐國帝避往南蠻國從咸淳十一年方用蒙古年號即號至元十二年乙亥也蒙古名太元國此年當日本國建治元年乙亥至元年號至三十三年丙申其次大德元年丁酉當日本國永仁五年丁酉大德已後于今經十五年即至辛亥蒙古伐國已後律法廢絕不行雖有講通事不如法問越海人如是陳語三論宗中觀論百論十二門論是名三論若加智論即有四論姚秦弘始十一年己酉羅什三藏譯出中論四卷當東晉安帝義熙五年日本國人王第十九代反正天皇御宇四年己酉十二門論一卷弘始十一年譯百論二卷弘始六年甲辰譯智論百卷弘始四年壬寅初譯至同七年乙巳歲末譯場解座四論竝什師譯百論提婆所造餘三竝龍樹造羅什三藏生龜茲國少年之時往北天竺隨磐頭達多學諸阿含經往北竺時年甫九歲十二母携還于龜茲到沙勒國一年留住誦阿毘曇六足論等什公已還龜茲國隨沙車王之子須利耶蘇摩習學三論年滿受具從卑摩羅叉學十誦律于後往五天竺廣學內外大小諸典亦還龜茲大弘佛法年六十三至東晉朝西涼州厥後經十九年至姚秦國弘始二年已後傳譯經論諸宗本教多以羅什所譯為源三論宗以羅什為神州高祖成實論宗亦什師譯天台宗以法華經中論智論為本為源立三觀義菩薩戒宗梵網為本阿彌陀經淨土本經金剛般若諸宗皆翫般若心經諸師服膺維摩詰經諸宗解譯皆是羅什三藏所譯龍樹菩薩三論高祖真言秘藏龍猛所傳十萬華嚴龍樹所誦大不思議論龍樹大士造天台亦以龍樹為高祖智論三智一心中得中論三諦偈等此等竝是所憑所立宗義曇鸞法師專仰龍樹為淨教高祖十住婆沙難易二道為立教本中論一部天竺釋之有七十家其中無著菩薩造順中論護法論師釋提婆百論竝安歸命阿闍梨句世親菩薩亦註百論安慧菩薩釋中觀論如是法相諸祖解龍樹提婆論布貴道詮有言四河入海同從無熱池而出七宗分鑣俱從三論宗而分三論是七宗之本諸宗是三論之末取意顯密諸宗龍樹為祖真言秘藏專在龍猛羅什三藏譯三論竟舉世講說通國習學三千門人皆悉鑽仰八宿上首各互弘通道生上足有曇濟法師道朗僧詮繼踵弘敷法朗吉藏承跡氷藍僧導道溫宋代耀燈僧鍾智林齊朝飛風慧勇慧布竝陳朝敷教慧哲法燈同隋世弘宗至入唐朝風光彌昌智枝慧瑜法敏慧璿慧眺雲眷元康玄壁如是等師橫竪弘布彌綸普天敷遍廣地者也涅槃宗北涼高祖武王元始三年甲寅天竺曇無讖三藏初譯涅槃經至同十年十月二十三日譯竟一部四十卷文義周備焉初譯之年當東晉安帝義凞十年姚秦弘始十六年日本人王第二十代允恭天皇御宇三年甲寅南山內典錄云此涅槃經摠十萬偈今出四帙止三萬偈所少二分有餘若具本文以唐言度則百有餘卷已上本經已譯舉世開敷宋慧靜法師曇無成法師僧莊法師道汪法師靜林慧定是斌超進法瑤道登曇度道盛如是等諸師開宗立義製䟽作章師資相承弘通多端立此號涅槃宗講通流傳不絕隋朝慧遠法師意在涅槃彼門人智徽法師興涅槃宗相州法礪律師學涅槃宗西河道綽多講涅槃南山宣師意在涅槃京兆法寶立涅槃宗舉五時教攝大小典大日本國昔於大安寺真言院之傍弘涅槃宗講敷彼經號常修多羅宗是也地論宗華嚴大經有七處九會其第六會十地一品龍樹菩薩於海龍宮誦此華嚴經九會等十萬頌文出閻浮提流布五印後人摘第六會十地一品別行流傳菩薩造論釋此一品即堅慧菩薩金剛軍菩薩等其人也如來滅後九百餘年天親菩薩釋十地經名十地論即第六會十地一品別行五天名十地經天親論中具牒本經一一解釋昔後魏亦云元魏亦云北魏第七主宣武帝永平元年戊子之歲四月上旬命北天竺三藏菩提留支此云道希并中天竺勒那摩提此云寶意及傳譯沙門北天竺佛陀扇多并義學緇儒一十餘人在太極紫庭初譯此十地論上皇自親筆受後付沙門僧辨等至同四年辛卯之歲夏首譯竟一部十二卷始末整足焉留支勒那各譯一本光統律師自解梵文合兩三藏對御和會合成一本永平元年戊子當梁高祖天監七年戊子日本人王第二十七代御宇繼體天皇二年戊子十地宗義創被神州光統律師十地宗匠光統門人有慧順法師道慎法師俱為神解之秀各立若干門輩靈裕慧藏慧遠智矩竝隋朝高匠道宗法偘靈幹辨相俱唐朝法英齊朝大僧統合水寺法上者地論涅槃之高德也道慎師事稟承所宗大禪定寺靈璨法師隨淨影寺慧遠習學地論辨相法師亦從遠公慧覺法師著十地䟽如是諸師講敷地論建立宗旨非一眾多唐朝聖運盛弘華嚴地論啻是一會法門後代漸次講者不多屬華嚴宗非別宗故淨土宗前魏之世康僧鎧三藏譯無量壽經二卷宋世畺良耶舍三藏譯觀無量壽經一卷姚秦羅什三藏譯阿彌陀經一卷如來滅後九百餘年天親菩薩造無量壽經優婆提舍一卷名淨土論亦名往生論後魏菩提留支翻譯弘之曇鸞法師受之留支留支授觀無量壽經鸞師註淨土論道綽禪師歸宗為祖善導承繼造疏弘宗懷感法照少康知玄盛弘淨教昔廬山慧遠法師創開蓮社弘持淨教十八賢眾修習淨業乃至後代開敷彌昌後世慈雲元照等師弘敷淨教橫竪耀光念佛法門末代䂓矩三經一論為所憑教上古廬山法師中古曇鸞道綽善導懷感等師後代慈雲靈芝靈芝律師先學律宗次學台宗宗有所證次亦弘律南山律師三大律部各施記解後研淨教二十餘年取捨諸師作二經疏陳自正義依承者眾記述非一天下淨教皆歸彼義行業義解事在一均泉涌俊芿不可棄法師遠越波瀾入宋學法正傳台教律宗兼傳靈芝淨教即是淨教相傳規模厥後彼寺宗師智鏡大德入宋傳律亦習淨教遂還本寺昌弘所學淨教所傳泉涌為本然日本所弘皆用善導鏡公本學善導彼此兼包取捨在意後二大德允公阿公皆兼京師靈芝二途兼正兩門亦在意慮禪宗禪門法理由來良久三代僧傳皆舉習禪之德數世法匠多有靜慮之學或初開荒途或自尋教典竝學路之山籍宗途之漸次也梁室已後學道稍多或達磨門葉或餘宗兼匠慧勝慧景道善意學僧那慧滿覺明心地諸大乘宗皆有禪法教相觀行要飛雙輪天竺傳法第二十八祖菩提達磨梁朝嘉運西來化物以心傳心事超言象義在純一非兼帶域正法智眼次第相付靈知妙心連續傳授慧可僧璨風靡相隨道信弘忍芬郁端肅五祖之下南北分宗南宗亦開五家七宗北宗純一未必相諍五祖弘忍之下有神秀禪師是北宗始祖普寂禪師承于神秀寂禪師下有道璿禪師日本天平八年丙子來朝住大安寺弘所習學禪法律法璿公以禪授與同寺行表和尚行表授之最澄大德最澄大德後習天台即入唐受法開比叡山大弘天台宗兼弘禪法日本禪法傳教大師飡其風芳與台宗禪一均弘通南宗禪法後代甚昌五家之後亦分二宗摠號七宗南宗禪法後代之中稍施芬郁日本禪法近代當世華洛餘方流傳甚昌攝論宗攝大乘論者無著菩薩解釋阿毗達磨經十萬頌中攝大乘一品天親菩薩更作釋論解本論文真諦三藏梁代西來至陳第二主文帝天嘉四年癸未別譯本論三軸成部翻譯釋論為十五卷釋論之中具牒本論真諦門人各講此論師資相承立義製疏義勢森羅施其光用諸師翫習號攝論宗慧曠法師親從真諦三藏聽攝大乘論普光寺法常法師真諦孫弟於攝大乘專所精研法常弟子有智儼法師講敷華嚴兼研攝論道岳法師慧休法師竝攝論揚名僧辨大德靈潤大德俱攝宗播德栖巖寺神素弘地攝二論仁壽寺海順亦通地攝兩宗崇聖道場靖嵩法師專弘攝論大興國寺法祥大德是慧遠弟子兼研攝論十地如是陳隋唐朝諸師翫攝大乘講文製疏天下一均無不服膺然攝大乘法相宗論玄奘三藏傳法相宗普天九州無不靡風攝大乘論人法相宗通暢顯揚無有異路成唯識論引六部之經十一部論成唯識義攝論是隨一法相宗專學之十殊勝語貫諸法義佛法淵府窮源盡性而已天台宗北齊之代慧文禪師修得無生法忍開顯一乘妙理此當梁之末陳之初運焉綱領整足證道精美次南岳慧思禪師精大詮而廓爾入妙理而朗然登相似之階居根淨之位大陳之世化儀洋洋顯揚一乘引發三昧次有天台智者大師稟承南岳入法華場妙悟開發證陀羅尼位登五品身備十德開四教路通八萬詮立五時門判五千法陳隋二代敷演大被神地九州化儀廣布自爾已來師資相承弘通繁昌敷演縱橫章安是結集之匠荊谿乃記述之英行滿道邃如天之日月知禮仁岳似時之鸞鳳遐方弘演終古流通啻是天台教觀而已華嚴宗昔東晉第十主安帝義凞十四年戊午覺賢三藏傳譯六十華嚴經厥後諸師講敷眾哲開演製䟽作章釋文立義翻譯本經當日本國人王第二十代允恭天皇御宇七年戊午至陳之嘉世有杜順禪師是清涼山文殊應化居終南山弘布華嚴開五教止觀立三重法界圓融妙義方提綱領智儼大師發揮五教證悟六相開濟彌綸香象大師普賢應迹顯揚一乘恢弘十宗清涼圭山高張圓網淨源師會廣轉教輪杜順尊者年三十七終南九州盛播法化即當日本國人王第三十四代推古天皇御宇元年癸丑即隋開皇十三年癸丑也杜順大師至大唐第二主大宗皇帝貞觀十四年庚子入滅春秋八十四于時智儼大師年三十九第三高祖香象賢首大師大周則天聖后嘉運大播化儀一天歸敬四海朝宗大唐第六主玄宗皇帝先天元年壬子賢首入滅春秋七十當日本國人王第四十三代元明天皇御宇和銅五年壬子大唐第十四主文宗皇帝開成四年己未清涼大師入滅春秋一百有二當日本國人王第五十四代仁明天皇御宇承和六年己未法相宗大唐第二主大宗皇帝貞觀十九年乙巳玄奘三藏從西天還譯所賷經論等弘所習法相宗三千門人七十達者四般上足一秀入室舉世學法相宗經國習唯識教出萃高足一般入室慈恩基師即其人也二藏眼目百本䟽主目放神光口流辯河淄洲撲揚繼踵敷教義忠如理竝肩立義因內二明騰羽翼於義天教觀兩門馳輪乘於法地後代連踵不絕永世履蹤無廢真言宗大唐第六主玄宗皇帝開元四年丙辰善無畏三藏始屆長安東夏之中創弘祕教當日本國人王第四十四代元正天皇御宇靈龜二年丙辰三藏創譯大日蘇悉地經等及諸儀軌等開元八年庚申金剛智三藏初到東都大賷祕教梵本翻譯傳授弘通開元庚申當日本國養老四年庚申不空三藏年甫十四隨金剛智方來東夏至三十七往南天竺遇龍智菩薩更受金剛頂瑜伽五部祕藏等大寶五年丙戌歸至上都當日本國人王第四十五代聖武天皇御宇天平十六年丙戌玄宗深敬勑令譯經即金剛頂經般若理趣諸儀軌等密藏所有諸經祕典并密嚴仁王等諸部經教大開譯場皆悉翻傳善無畏等三人三藏皆隨龍智菩薩習學真言隨諸三藏受祕教者各盡懇志其數其多不空三藏弘傳尤久興善含光新羅慧超慧辨又慧果元曉覺超慧琳等竝隨不空三藏習學祕教如是諸師弘密藏者大唐甚多不可具擧上來所陳一十三宗大小諸教竝是震旦漢地之中所傳興宗上古已來乃至後代漸漸傳興競行流演此十三宗旨歸多途或是大小二教轍異如毗曇成實是小乘宗律宗一藏教在小乘行通大小震旦日域諸師所興律是大乘直入一乘三聚圓戒於律儀行用諸律藏諸部律藏與大一故菩薩萬行所應行故菩薩戒律未傳來故自餘十宗皆是大乘或是化制二教義別律宗是制餘皆化教或性相二宗分途如法相唯識是法相宗華嚴天台等是法性宗或聖道淨土宗異如淨土教是淨土宗餘宗皆是聖道教宗諸大乘宗有說淨土所立義門屬彼宗不應別立為一宗教然一類機別成教行如善導等故為別宗或禪教兩門或顯密二教如是分路無不括盡如來滅後一千十六年後漢第二主顯宗孝明帝永平十年丁卯摩騰羅漢賷佛經等始來漢地當大日本國人王第十一代垂仁天皇御宇九十六年丁卯自爾已來大小乘經律論漸次傳來西來三藏遠越嶮路方入漢境以隸字替于梵書以漢語易于天語所詮義理彼此不別名之翻譯匡詳不易復有從漢往梵之者法顯三藏初開荒途其後往往至彼者眾博譯聖教繼續甚多橫竪數朝滿二十代古來諸師隨所樂經各事講學互立門輩弘所習學若以此為宗宗承甚多焉或從天竺傳來弘之或於漢地立宗傳之建立雖多取廣翫習不過十三如上已列雖十三宗後代澆漓漸次廢怠所學不多
