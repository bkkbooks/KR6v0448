body:
  text: 東大寺沙門凝然述大日本國諸宗傳通夫大日本國人王第三十代天國排開廣庭欽明天皇御宇十三年壬申十月從百濟國創傳佛法彼國主聖明王自作願文送獻日本聖朝乃金銅釋迦佛像并幡蓋等及經論若干卷是也次第三十一代聖主渟中倉太珠敷敏達天皇御宇六年丁酉十一月復從百濟國彼國之王獻經論若干卷并律師禪師比丘尼呪禁師佛工造寺工六人遂安置於難波大別王寺聖德太子六歲時也明年七年太子披覽彼經論選六齊日禁斷殺生下勑詔於諸國普禁殺生如是漸漸佛法傳世持法之僧從他國來佛法漸弘人皆歸信其間有守屋大臣破滅佛法等事以太子方便國皆歸佛法堂塔多興寺宇廣造推古天皇御宇佛法僧宗特昌諸宗漸傳衆教大興佛法初傳漢地之後三百餘年佛法從漢傳百濟國厥後百濟一百餘年壬申之年法傳日本是故日域佛法濫觴從百濟來隋朝佛法未傳日域推古天皇御宇十五年丁卯太子遣妹子於大唐衡山召先身道具等厥後第三十七代聖主孝德天皇御宇白雉四年癸丑道昭和尚往大唐國隨玄奘三藏學法相宗自此已後漸漸往還諸師習學佛法而還傳法高僧往還傳法乃至後代住住不絶日域佛法總有八宗古來諸師漸漸傳之一三論宗二法相宗三華嚴宗四俱舍宗五成實宗六律宗七天台宗八真言宗隨一一宗陳弘傳相三論宗百濟佛法傳日域後至推古天皇御宇三十三年乙酉經七十四年當大唐高祖武德八年乙酉此年高麗國王貢僧慧灌來朝此乃三論學者隨大唐嘉祥大師受學三論而來日本是日域界三論始祖而未講三論裹玉而未開從此前年觀勒法師自百濟國來此亦三論宗之法匠亦未講通法教至第三十七代聖主孝德天皇御宇乃請元興寺僧高麗慧灌法師令講三論其講竟日任以僧正此乃日本僧正第二第一僧正同寺觀勒然僧綱補任記云慧灌或作觀字法師第三十四代推古天皇御宇三十三年任僧正焉有此異說若會異說本元興寺有九僧正謂慧觀觀勒慧師慧輪等前後補任此等僧徒皆為聽衆講論竟日總預勸賞多人任僧正矣慧灌僧正以三論宗授福亮僧正福亮授智藏僧正智藏越海入唐重傳三論遂乃歸朝弘通所傳是第二傳也智藏授法道慈律師道慈第四十二代聖主文武天皇御宇大寶元年辛丑越海入唐總傳六宗三論為本在唐學法一十八年第四十四代元正天皇御宇養老二年戊午道慈歸朝此年遷都於奈良經十一年道慈於唐賫西明寺圖樣而來即奉勑詔遷古京本大安寺於奈良京任西明寺圖樣華構周備即於彼寺弘在唐所學宗三論為本兼弘法相真言等宗道慈在唐十八年間普學大唐所有諸宗善無畏三藏開元四年丙辰來唐道慈在唐具經三年其間道慈隨善無畏習學真言大安寺有慶俊律師善議大德隨從道慈俱學真言慶俊大德專以真言為其本宗乃愛宕山本願也三論一宗從唐土傳有三代傳一云慧觀僧正傳二云智藏僧正傳三云道慈律師傳孝德天皇御宇大化二年丙午慧師慧輪智藏三般同時任僧正是三論講竟日之勸賞也智藏上足有三般匠乃道慈智光禮光也智光禮光奈良新元興寺住侶立仙光院弘通法宗莊嚴極樂房圖安養依正安置彼房是智光法師所建立也如來滅後經一千五百七十四年乙酉之歲慧觀來朝來朝之後二十一年未廣講敷大化二年丙午初開三論講場此即佛法傳日本後經九十五年始講三論其第二傳智藏僧正未詳時代應勘僧史第三傳者道慈律師大寶元年辛丑初傳之後經十七年當大唐第六玄宗帝開元六年戊午善無畏三藏來唐之後經三年焉道慈天平十六年甲申十月入滅年七十餘善無畏三歲於唐翻譯大日經後來日本國初著東大寺西南之阿古老傳云結庵八十日住後盧來目寺東院之岫經二箇年七百二十日住其間建立多寶大塔八丈移南天鐵塔之半分以佛舍利三粒納寶塔之底以大日經七軸安剎柱之下然後三藏還大唐國開元二十三年乙亥入滅春秋九十九當日本國天平七年乙亥善無畏三藏來至日本年代未詳然開元十二年已後翻譯大日蘇悉地蘇婆呼經三藏為一行禪師講大日經隨講記録成二十卷此即一行具以三藏講授口傳如言記之全是三藏自親解釋非一行自作只是具結集最初草本弘法大師傳之弘通唐朝後人取捨文句或為十卷十四卷等開元十五年丁卯十月一行入滅春秋四十二當日本國聖武天皇御宇神龜四年丁卯其後善無畏應是來日本國即神龜五年戊辰次天平元年己巳二年庚午應此時代未立東大寺前當此寺西南之阿結庵居住于後弘法大師於此處所建立真言院總言南院者是也其後三藏歸大唐者應是天平三年已後焉三藏西來先譯求聞持法道慈傳求聞持法者即隨此傳受道慈律師於日本國應謁善無畏其時道慈造大安寺土木終功昌弘宗教道慈授三論法義於善議善議授法於安澄勒操西大寺實敏大僧都受法於安澄大德即弘之彼寺西大寺三論宗者實敏所弘也自爾已後彼寺學三論宗名哲繼踵橫竪弘通弘仁聖代玄睿律師製三論大義抄四卷奉勑詔造之法隆學問寺昔元弘三論宗布貴道詮及貞玄律師等即法隆寺三論宗也近代弘法相宗從昔習學太子三經疏近代已來昌致學業本元興寺本學三論遷彼寺於平城都已來專弘三論智光禮光俱住彼寺智光授法於靈睿法師靈睿授之於藥寶法師藥寶授之願曉律師此等諸德皆元興寺三論宗也願曉授法於聖寶僧正聖寶者七大寺之撿挍也以三論為本宗兼學法相華嚴因明俱舍成實顯宗義途精核究暢祕藏真言研核旨歸包括之德無敵對者遂於東大寺建東南院以為永代三論本處即以宣旨元興寺三論知識供見遷于東大寺此寺元學三論八宗兼學自昔傳來人王第六十代醍醐天皇御宇延喜五年乙丑聖寶建此三論本處補此院主者乃三國相承三論長者昔者諸寺之中三論碩學以官府宣為宗長者東南院主代代碩德皆為其選至第七十代聖主後三條天皇御宇殊以東南院務為宗長者所被宣下東南院務聖寶已後于今一十八代顯密兼學作宗貫首但勝賢一代唯密宗寺中衆徒從昔至今學三論者竝肩繼踵互奪金玉俱諍蘭菊永觀珍海樹朗重譽竝中古學英乃智解鸞鳳也明遍貞敏秀慧覺澄俱近代名哲是學識玉鏡也厥後樹慶智舜快圓定春等繼踵騰旨不可勝計者也法相宗法相大乘應理圓實宗亦曰唯識宗亦名普為乘教玄弉三藏往中天竺大傳此宗還支那國講弘天下三藏上足有慈恩基師基師上足有淄洲師淄洲上足有撲揚師嫡祖相承橫竪彌昌此法相宗弘傳日域朝代非一師承有數昔欽明天皇御宇壬申之歲百濟佛法創傳此國厥後經一百二年至第三十七代孝德天皇御宇白雉四年癸丑道昭和尚越海往唐遇玄弉三藏學法相宗即當唐朝第三主高宗皇帝永徽四年癸丑玄弉三藏年五十一慈恩大師齡二十二道昭與三藏宿在同房與慈恩同學久在門下受學積年提誘殷勤特傳觀門于後歸朝即弘所傳三藏新翻經論諸典創傳日域即其人焉第二傳者道昭入唐之後經於六年至第三十八代女帝齊明天皇御宇皇極重祚四年戊午智通智達兩般法師乘新羅船往大唐國遇玄奘三藏學法相宗大日本國此戊午歲始行維摩會為永代規矩兼學法於慈恩大師後還本朝大弘宗旨第三傳者道昭入唐之後經五十一年至第四十二主文武天皇御宇大寶三年癸卯新羅智鳳智鸞智雄三師俱奉勑命渡海入唐謁撲揚大師學法相宗或遇玄奘慈恩學習宗旨者然二師入滅經年序遂歸本朝大弘宗教智鳳慶雲三年丙午維摩講師第四傳者道昭入唐之後經六十四年至第四十四代女帝元正天皇御宇靈龜二年丙辰玄昉法師渡溟入唐乃謁撲揚智周大師研法相宗于時智周年三十八唐開元四年也玄昉法師在唐學法經二十年第四十五代聖武天皇御宇天平七年乙亥七月歸朝大於所傳妙揚宗旨四代連綿各傳宗教而智鳳門葉經世甚昌玄昉所傳與鳳一合事無異途惣通弘演道昭和尚授法於行基菩薩也智鳳智鸞各授法於義淵僧正義淵有七人上足謂玄昉僧正行基菩薩宣教大德良敏大僧都行達大僧都隆尊律師良辨僧正也道慈律師亦從學法即成八人然道慈律師雖學諸宗三論為本故專為彼宗祖師並興福元興南北兩寺學者衆多競立義理因內二明互諍金玉朋黨相扇成兩寺異乃至當代興福一寺學侶繼踵論難彌昌並是智鳳玄昉後裔門葉而已然法相宗雖興福寺根本所學而諸寺多學無不弘敷謂延祥僧正守印大法師守寵法師神睿小僧都廣達大法師勝虞大僧都護命僧正明詮僧都平備已講施平律師長源已講峯基律師賢應已講玄宗和尚如是等師皆是元興寺法相宗也仲繼律師明哲律師長朗律師戒明和尚慧達大僧都真慧律師隆光律師平智律師藥仁已講義聖律師義睿小僧都藏祚小僧都慈念律師等竝藥師寺法相宗也東大寺本願良辨僧正者雖建東大寺專弘華嚴宗而元隨義淵僧正學法相宗故東大寺兼弘法相良辨弟子或有華嚴法相兼學如安寬律師標瓊律師鏡忍律師等或有唯華嚴宗如良興小僧都良慧大僧都永興律師等三修律師平仁已講明一大德義濟已講法藏僧都圓藝已講等並是東大寺法相宗也泰演律師善海律師玄睿律師實敏大僧都平詮大法師忠芬小僧都常騰小僧都延善小僧都浮珍已講等並西大寺法相宗也大安寺亦有法相宗道慈律師入唐學法歸朝之時最初講慈恩七卷章自爾已來法相餘風大扇彼寺法隆寺中古已來習學法相于今甚昌藥師寺習學法相於今彌昌興福寺者自昔已來乃至後代專學法相學侶繁昌論難彌昌學侶不知數鑽仰不限年智海濬濬義峰峙峙欲陳述其相承次第橫竪支流難率舉盡且舉一流嫡祖次第智鳳義淵宣教大法師賢璟大僧都明福小僧都延賓已講空晴僧都真喜僧正林懷大僧都主恩大德或經救大僧都永超僧都湛秀已講覺晴大僧都藏俊贈僧正覺憲僧正貞慶上人貞慶之後乃至當代若干英哲智德無非皆是貞慶後裔門流六宗長官自昔孤在法相一宗補興福寺別當之人遂此前途應和已後被置權官維摩大會行在興福遂業遂講非唯專寺他寺他宗亦遂洪業華嚴宗大日本國傳佛法後諸教漸弘諸宗亦昌華嚴圓宗傳來是久然華嚴宗古德記述日本佛法初傳年代總有二說一昔新羅學生大安寺審祥大德記云檜隅蘆入野宮御宇宣化天皇即位三年歲次戊午年十二月十二日從百濟國佛法傳來宣化天皇即第二十九代帝王也二東大寺圓超僧都延喜十四年甲戌奉詔撰華嚴宗并因明章疏目録彼序中云磯城嶋金指宮御宇欽明天皇十三年佛法始傳矣雖有二說若依多分圓超所說以為正録由此義故華嚴學者應以超録定法初傳宣化天皇戊午年後經十五年至欽明天皇御宇十三年壬申彼戊午歲雖佛法傳事是草創趾基未廣不以為定壬申初傳事歷天下是故諸家多以為定壬申已後至第四十五代天瑞國押開豐櫻彥聖武天皇御宇天平八年丙子之歲經一百八十年此年七月二十日大唐道璿律師來朝璿公是華嚴寺普寂和尚之弟子普寂即華嚴宗法匠隨北宗神秀禪師傳達摩禪法璿公隨普寂習傳華嚴及以禪法亦明律宗亦善天台宗達菩薩戒璿公賫華嚴宗章疏始傳日本如來滅後至此丙子之歲已經一千六百八十五年宗教雖傳而未講弘當時有一高德沙門諱曰良辨凝神真原垂化俗林悲智潛用難可思焉欲弘此宗深發誓願決徹彌固遂感靈夢有一紫衣青裙僧從東方虛空下來告云汝欲弘演此一乘教請嚴智師以為座主方於不空羂索之前可令開講云云夢覺喜躍感悅無極然嚴智師在元興寺良辨和上即往彼寺請彼大德北師答云吾名是嚴智而心非嚴智然新羅學生大安寺審祥大德是真嚴智應請彼師講敷華嚴僧正良辨乃往彼寺屈請彼師大德辭之再三殷請固辭不向僧正和上于是奏聞仍以勑請此時方向遂以天平十二年庚辰十月八日於金鐘道場即東大寺羂索堂也名法華堂大集京城名僧大德以審祥師為其師宗方講宣此大華嚴經初講之時上現紫雲亘覆春山聖朝睿覽奇歎無量乃施綵帛一千餘匹天皇皇后及諸卿等施入衣等不可勝計厥年天皇四十滿賀始弘一乘睿感祥祥由兹天皇即發弘誓大願於此一乘極為尊重特詔隆為務救濟為心矣遂以天平十六年歲次甲申歸命三寶降勑百寮肇建知識華嚴別供自爾已後每年不絶恆昌講敷為永代式然則此華嚴宗平城御宇勝寶感神聖武皇帝為其初興大檀主以傳遐世天皇以東大寺為首於諸大寺弘六宗教厥中大華嚴經最是根本法輪如來成道第二七日說覺帝人王最初同崇乃斯華嚴一乘而已故勑詔曰當今實爾何生怪恨願同趣者莫撥莫退勤勤學悟此一乘之大義已上當知此宗最初傳者天平八年大唐道璿律師乃其人也講弘傳者丙子之後經五箇年天平十二年庚辰審祥禪師乃厥匠也發願初興者即良辨僧正是其英也良辨本隨義淵僧正學法相宗彼七人上足之一也今正發願初興華嚴金鐘道場執金剛神者良辨僧正之本尊也良辨元名金鷲仙人是彌勒應迹自造彌勒像安羂索堂執金剛神放光照內裏良辨奉祈聖朝安穩音聞內裏已達上聞乃被立勑使良辨奏聞奉禱聖朝安隱建立大伽藍祈禱懇志深契睿慮乃先賜以羂索堂以公家土功造營已畢此處名金鐘寺天平庚辰華嚴初講即在此堂天平五年癸酉初造羂索院而此院中有二月堂安十一面像實忠和尚現身升兜率天遷四十九院中觀音院行業勸請補陀落山觀音為堂本尊修懺悔法兼安小像為堂本尊今此不空羂索觀音惣名金鐘寺後立東大寺為彼所管處華嚴本經惣有三部六十華嚴自昔已傳而未講演徒積年序隱密不弘八十華嚴大唐證聖元年乙未之歲始開譯場至聖歷二年己亥之歲首尾五年翻譯總訖聖曆己亥當日本國文武天皇御宇三年己亥之曆于後天平八年丙子玄昉法師後任僧正賫一切經來即傳此經于後天平勝寶六年鑒真和尚來朝之時此八十經從身賫來四十華嚴及清涼八十經大疏二十卷大同元年丙戌之歲弘法大師初傳此國當大唐第十一主憲宗皇帝元和元年丙戌此四十經大唐貞元十二年初譯名貞元華嚴經譯後經十一年方傳此國天平十二年始所講之者乃是舊譯六十華嚴新羅學生大安寺審祥大和尚屬講弘之選初演此宗審祥即往大唐隨香象大師學華嚴宗即是親承高祖之名哲也既以勑詔為宗講師于時請慈訓小僧都興福寺最初別當鏡忍僧都圓證大德以為復師請十六德為其聽衆首尾三年講六十經一年二十卷三年之中終六十卷以探玄記講六十經審祥禪師三年終經天平十四年壬午奄焉卒矣厥後即請前三復師立為講師次第講敷言講師者讀經論文初開義途立理顧旨窮盡綱目言復師者講師初開義理之後別時如前講文立義顯揚莊嚴講師所說講師所說如如來初轉法輪復師重敷如舍利弗第二轉法輪昔智勝如來初說法華經後十六王子覆說彼法華今立講師復師即此等例講師沒時復師轉補三般講師各二十卷三年繼續總盡一部次請元興寺嚴智大德以為講師標瓊律師并性泰大德為其復師亦講六十經竟次智璟大德以為講師澄睿大德春福大德為其復師講六十經并疏二十卷畢奉始經之日天朝行幸盧舍那佛前證明彼講自此以後古經及疏新經及疏講演繁多不可數量上依別供緣起載之言始經之日行幸者應是講始六經八經之日言新經及疏者是刊定記一十六卷釋八十經具言續華嚴疏刊定記清涼大疏未傳度前以刊定記講八十經東大寺者四聖垂應所建立也聖武天皇救世觀音上宮太子再誕良辨僧正彌勒垂化天竺婆羅門菩提僧正普賢化身行基菩薩文殊應現或為大檀主立大伽藍弘華嚴宗或為祈禱師奉授一乘於帝王或為供養導師奉果睿願或為勸進棟梁奉助御願自餘開眼鯖翁傳戒雅樂乃至木工金師無非皆是大聖應作翁之所荷鯖者八十華嚴經是也以東大寺是華嚴宗故化來者以經表彰南大門懸大華嚴寺名額大佛殿二階之間顯恆說華嚴院靈額寺內遍滿皆學華嚴自天平十二年至延曆八年己巳五十年恆說華嚴自後講說于今不絶論難決擇任持法命良辨僧正臨終以華嚴宗付崇道天皇崇道受囑於大安寺建立東院弘華嚴宗彼寺本有審祥禪師曾講華嚴後更興之藥師寺正義大威儀師者元是法相慈訓弟子慈訓兼學華嚴正義隨慈訓亦學華嚴宗藥師寺亦有長朗律師者元是法相學者正義奏聞以官府宣移長朗於華嚴宗長朗隨正義學華嚴宗藥師寺有明哲律師隨慈訓學華嚴長朗弟子有義聖律師於五教章多作私記録長朗義昔藥師寺如是弘通華嚴宗也西大寺亦兼弘華嚴宗元興寺有嚴智大德弘華嚴宗大宋高僧傳東大寺名為城大寺國分寺門懸金光明四天王護國之寺名額是日本國總國分寺門大護海內專保天下國土豐樂隨由此門興榮弘法大師書此門名額造梵天帝釋四大天王金剛力士形像安置額二邊以示天等護國之相額之文字筆點有表國字極大表國大榮國中王字體相極大表示帝德彌綸普天如是等也日本華嚴良辨為初興本願審祥是初講祖師聖武天皇乃造寺興宗之大檀主三大祖師建興一乘永世紹隆規矩在兹良辨上足有實忠和尚是十一而觀音應迹自餘安寬律師鏡忍僧都標瓊律師良興小僧都良慧大僧都永興律師忠慧律師等並良辨門人各秉宗教橫竪流演實忠上足有等定大僧都是桓武天皇御師範也桓武天皇東宮已前於龜瀨山峯師子現無畏之身大聖示老翁之姿師子復本形顯童子之形必是五髻文殊童子等定拜之奉進臨幸於寺乃河內國西林寺也彼寺是天智天皇之御願等定即是彼寺住僧東大寺為本寺習學華嚴講敷不倦桓武天皇踐祚之後修造西林寺興隆東大寺顯揚華嚴紹續圓宗即以等定大僧都補東大寺別當等定大興宗教雙建真俗延曆十九年等定奄逝春秋八十有餘西林道場有等定房于後弘法大師自京往還高野常宿等定遺房彼房于今安大師真影等定弟子有正進律師進公授法于長歲和尚長歲兼因明師歲公授法道雄小僧都道雄隨弘法大師傳受真言創立海印寺弘華嚴圓宗兼真言城塹一方道雄授宗於基海大德次良緒律師繼踵弘傳良緒之下有圓超僧都有光智大僧都圓超延喜聖代獻華嚴宗并因明目録光智僧都日本華嚴第十代祖人王第六十二代村上天皇御宇天曆元年歲次丁未當大漢高祖開運四年丁未光智大德始建尊勝院為永代華嚴弘通本處司彼院務之人即為日本華嚴宗貫首光智已後乃至當代十有二代宗緒繼續建興二諦紹隆三寶學侶竝肩鑽仰宗教法徒繼踵論難精詳光智五世門葉有良覺大法師覺公門人有如幻景雅兩哲如幻僧都播州立寺名曰性海大弘華嚴學業不絶景雅法橋門人有高辨大德顯揚一乘播氷藍德開高山寺弘華嚴宗學業繁昌修練勇勵竝是本寺之清流圓宗之風芳者也辨曉法印者中古之英匠也論說兼備真俗竝暢紹隆有功宗緒無墜宗性權僧正者近代之名哲也智辨縱橫把彌天之德論難清雅播經國之量華嚴因明俱舍法相皆悉研究無不精詳諸宗奧旨兼暢無遺辨曉者後白河天皇御宇奉論說之勑詔宗性者後嵯峨天皇嘉運預智解之勸賞智德聯跡不慙昔日大日本國華嚴宗緒審祥良辨已來乃至當代貫首二十一代燈燈相傳學業繁昌法法流演紹隆連綿俱舍宗梵具言阿毗達摩俱舍此翻言對法藏此論從婆沙論而生焉婆沙解釋發智本論六足中義皆悉通會發智婆沙是對法藏今此俱舍全取彼名此乃全取他名有財釋也是故取本名俱舍論俱舍為門兼研有宗諸論所說隨其章品彼此對當一一格之錯練貫括有宗義理無不究盡光師寶師俱解釋論兼罄發智六足婆沙幽旨圓暉一師啻釋本頌而釋論難義無不皆注解唐朝解釋圓暉頌疏多家群起互諍金玉大日本國習學俱舍昔通諸寺各立義門附法相宗研竅此論元興寺護命明全等乃其人也護命僧正傳新羅智平法師義建立有為法體不生滅義餘先德等多是有為法體生滅義也東大寺自昔已來習學俱舍寺內所置八宗兼學雖俱舍宗附法相宗而滿寺皆學諸宗學者皆學俱舍中古已來華嚴三論兩宗學者各峙詞鋒互諍蘭菊兩宗學者自昔已來達有宗義善俱舍宗以東大寺為俱舍本處自昔學者鑽仰功多發智六足貫括胸內俱舍婆沙包納肝底正理顯宗懸味舌端法勝雜心浮見眼前依毗婆沙作問答式言陳意許轉變相反忽聞問題令惑人心如難提菩薩試阿羅漢似大乘論中轉變祕密義如是學者充滿寺中是東大寺俱舍宗不共德也華嚴三論兩宗學者既皆兼學有宗俱舍其師資相承事全同二宗血脉而或有承異師是隨時宜而已中古有秀慧顯範覺雄尊玄四英如須彌半腹有四天王焉各研有宗同婆沙四評家次有覺澄貞禪義海承僧四哲俱舍婆沙瑩玉發智六足懸鏡論難縱橫決斷任運近代有良忠聖禪兩德如孔門游夏同什公肇睿次有快圓定春兩雄是有宗之龍象毗曇之麟鳳也彼同時有華嚴貫首權僧正宗性上綱非唯華嚴因明為最極上首亦兼研俱舍宗薩婆多宗深義奧理探𧷤究底洞微盡幽大解孤絶之德深智獨標之譽如日輪映衆光同大海吞衆流若有難決之義共聖禪語話耳當代滿寺俱舍學侶相繼不絶論難彌昌成實宗成實論宗由來良久日本佛法初傳之時成實宗與三論宗同時傳來是故後代以成實宗附三論宗聖德太子作三經疏以成實論為法相門依光宅義以立義門光宅法師是成實師正弘大乘而以成實判法性相高麗慧慈慧觀百濟慧聰觀勒竝三論宗法輪之匠此為初起後漸傳教此等諸師皆通成實太子以慧慈慧聰觀勒為師習學佛法即是三論成實宗義而已昔百濟道藏法師造成論疏有十六卷上古傳來于今有之昔以成實即附三論自爾已來彼宗之人相承習學東大寺三論宗昔日兼學成實論宗講成實論以道藏疏又有成實義章二十三卷未詳誰造又有成實義林二卷成實學有玩此等章講論談疏昔日已來中古已前人各策勵元興大安西大法隆學三論處皆兼成論昔西大寺三論宗玄睿律師作三論大義抄即成立成實宗附三論宗之義俱舍附法相宗彼抄具明之東大寺中古已來三論宗學侶雖不別講成實論而淨影大乘義章明三宗中有成實義故彼宗人知成實義嘉祥大師章疏文中多舉成實論宗之義破之拆之淨影章中猶多明成論義故後代學侶知成實義要在三論宗學者之中成實論宗相承次第應知其相淨影義章三宗義者毗曇成實大乘是也若依此義學彼章人亦知毗曇道基法師攝論義章有十四卷亦明三宗毗曇成實攝大乘宗彼師亦作阿毗曇章十五卷明毗曇義其中往往明成實義成實宗緣起如是
