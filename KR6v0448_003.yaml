body:
  text: 東大寺沙門凝然述律宗律宗教法其來尚矣欽明天皇御宇壬申佛法初傳厥後連續佛法漸傳壬申已後經三十七年第三十三代崇峻天皇御宇元年戊申從百濟國獻於佛舍利及僧畫工于時馬子宿禰請百濟僧問受戒儀式彼僧答云僧衆受戒以十人五人行之尼衆受戒於彼尼寺先行本法後往僧寺隨僧受之尼衆亦往二衆具足於中受之此國尼衆無其行法二衆不具不能受戒禪藏等三尼遂往百濟十戒六法具戒三重皆已成就經三年歸尼寺儀式移此而來三尼已歸他國僧衆來朝是多然人數不足諸緣不具尼衆受戒其事全無他國僧衆即彼國中如法僧人此國初起非如法受唯是相似緣不具故而僧極多不可稱計推古天皇御宇三十二年甲申四月戊午詔曰自今以後任僧正僧都應檢校僧尼即九月丙子校寺及僧尼當于是時寺四十六所僧八百十六人尼五百六十九人云云即以百濟僧觀勒初為僧正法務明年乙酉以高麗王貢僧慧觀補任僧正如是雖有僧尼二衆未行如法受戒儀式第三十七代孝德天皇御宇白雉二年辛亥十二月晦日於昧經宮請二千一百餘僧尼使讀一切經如是衆僧非儀式受第三十八代齊明天皇御宇六年五月有司奉勑造一百高座一百衲袈裟設仁王般若之會第四十代天武天皇御宇白鳳四年乙亥四月請僧尼二千四百餘人大設齊會僧尼雖多未傳戒律天武天皇御宇詔道光律師為遣唐使令學律藏奉勑入唐經年學律遂同御宇七年戊寅歸朝彼師即以此年作一卷書名依四分律抄撰録文即彼序云戊寅年九月十九日大倭國淨御原天皇大御命勑大唐學問道光律師撰定行法已上奧題云依四分律撰録行事卷一已上淨御原天皇御宇已遣大唐令學律藏而其歸朝與定慧和尚同時道光入唐未詳何年當日本國天武天皇御宇元年壬申至七年戊寅歲者厥時唐朝道成律師滿意懷素道岸弘景融濟周律師等盛弘律藏之時代也道光定謁彼律師等習學律宗南山律師行事鈔應此時道光賫來所以然者古德記云道宣律師四分律鈔自昔傳來而人不披讀空送年月爰道融禪師自披讀之為人講之自爾已後事鈔之義人多讀傳已上取意道融并智璟皆是通達律藏之人道融禪師聖武天皇御宇天平年中朗辨僧正由靈夢告請道融禪師為說戒師行布薩法此即梵網菩薩說戒即請智璟法師令講行事鈔此即世間漸講律藏然未行彼受具戒法如賢璟言鑒真和尚已前諸僧皆依瑜伽行三聚淨戒自誓作法其從他受亦受三聚成七衆戒賢璟大德於維摩堂與思託律師論難之時即立此義成立通受比丘得具足戒之義如行基菩薩隨德光法師受具足戒者即是通受從他行相天武天皇御宇戊寅已後經五十九年至聖武天皇御宇天平八年丙子大唐道璿律師來朝此時多齎華嚴章疏及律宗行事鈔等來朝璿公住大安寺恆講律藏行事鈔等厥時人多習學律藏即於大安寺最初講行事鈔善俊律師等明律名匠即彼門人也道璿律英雖先來朝僧衆不足不能秉行結界登壇受具戒法啻恆講敷律藏而已天平丙子已後經十九年至第四十六代女帝高野姬孝謙天皇御宇天平勝寶六年甲午鑒真和尚來朝當大唐第六主玄宗皇帝天寶十三年甲午于時鑒真年六十七欽明天皇壬申已後至此甲午經二百三年於其中間雖有受戒於百濟學律於大唐律師來朝等之事而諸緣未備不行壇法鑒真勝寶五年十二月二十六日入大宰府遣唐使等此年歸朝明年勝寶六年甲午二月四日鑒真入京今取此年為其初基數時方齊鑒真入京已前數日之間僧衆俗侶遠往遣使慰勞迎接其事極多入洛之日勑遣正四位下安宿王於羅城門外迎拜慰勞引入東大寺安置同月五日唐道璿律師天竺婆羅門菩提僧正各來慰問右大臣大納言宰相已下官人百餘人來禮拜問訊後勑使正四位下吉備朝臣真吉備來口詔曰大德和上遠涉滄波來投此國誠副朕意慶喜無喻朕造此東大寺經十餘年欲立戒壇傳受戒律自有此心日夜不忘今諸大德遠來傳戒冥契朕心自今已後授戒傳律一任和上又勑僧都良辨令録諸臨壇大德名進內不經於日勑授傳燈大法師位其年四月初於盧舍那殿前立於戒壇天皇初登壇受菩薩戒次皇后皇太子亦登壇受戒尋為沙彌澄修等四百四十餘人授戒又舊大僧靈福賢璟志忠善頂道緣平德忍基善謝行潛行忍等八十餘人捨於舊戒重受和上所授之戒後於大佛殿西別建戒壇院即移天皇受戒壇之土築以作之過海大師大唐天寶二年癸未乘船離唐當日本國天平十五年癸未逆浪五回第六度時著日本地其間若難經十二年去天平五年癸酉勑興福寺永睿禪師大安寺普照大德入唐留學并請傳戒律之僧先請東都大福先寺道璿大德令向日本道璿年三十五天平八年丙子當唐開元二十四年丙子隨副使中臣朝臣名代之舶方來朝矣而師僧不足不行壇法睿照二德留唐學問具經十年欲歸日本天寶元年壬午詣大明寺請鑒真師酬雅請故明年發足而天平勝寶六年癸巳來朝傳律授戒宿誓滿足鑒真和尚是天台宗第四祖師從天台取若從南嶽取者是第五世隨弘景禪師受具足戒并學台教弘景是南山律師親度授具弟子隨章安大師學天台宗鑒真隨道岸律師受菩薩戒即是三聚通受之法隨融濟律師學南山律鈔業疏輕重儀等道岸融濟竝南山道宣律師受學弟子弘景融濟俱釋南山律鈔鑒真隨西京禪定寺義威律師聽法礪律師四分律疏一遍次就西明寺遠智律師聽彼疏一遍次於東京授記寺從全修律師及慧策律師聽彼疏各一遍後隨西京觀音寺大亮律師聽礪疏五遍前後始終學相部大疏總獲九遍上之諸師竝西塔滿意律師受學門人也鑒真受具五夏之中如是遊學究礪宣宗年二十六講礪律疏至三十一講南山鈔及輕重儀年至四十講羯磨疏其後迄六十六四部文籍常恆講說定慧證修內外該亘天台教觀研究精詳五乘洞達三藏通曉淮南江北傳燈明朗修造故寺八十餘所繼衲袈裟一千領布袈裟二千領供五臺山衆僧寫一切經三部各一萬一千卷其先所造石磚浮圖忽然放光和尚顯現菩薩三目六臂自名般若仙為講說靈驗唐朝諸人胡國昆崘新羅等人皆以鑒真為受戒和上講四分律及法礪疏滿四十遍講律鈔七十遍講輕重儀十遍講羯磨疏十遍親度僧尼四萬有餘厥中智行拔群者四十餘人各化一方俱是龍象皆究律藏兼研經論或是法相天台或是俱舍三論攝論維摩詰等衆典無不該暢和尚來朝之時隨身聖教廣多非一厥中律宗諸典天台諸文齎持是衆隨來弟子法進曇靜思託義靜法載法成等一十四人竝是智解名哲皆兼台宗所立戒場有三重壇表大乘菩薩三聚淨戒故於第三重安多寶塔塔中安釋迦多寶二佛像表一乘深妙理智冥合之相鑒真和尚宗研天台律弘四分四分當宗分通大乘況依內證天台教宗立壇弘律一乘法華開麁顯妙毗尼學者即大乘學五篇七聚即摩訶衍第一義光非青黃等三歸五戒八戒十戒皆是一實妙摩訶衍梵網大乘三聚十重六八八萬頓說頓圓即與妙圓一味會同平等夷齊廢權絶待本來一實開發俱時法位居然待麁顯妙遍外有圓和尚弘律猶非待麁豈涉藏通共門之義當知純圓頓妙極戒所結戒場一乘頓極三聚圓壇登此圓壇受戒法者通受則頓發三聚普遍之體別受則成三聚周圓之義祖師和尚傳戒立壇高廣深妙意致如是諸宗學人於此戒壇各受戒法隨宗立義皆是大乘一實境界鑒真和尚顯揚梵網彼經義途用撲揚疏及法銑疏而撲揚師依天台義廣作義疏後學法相專弘彼宗道璿律師注梵網經全依撲揚弘之遐邇法進僧都注梵網經全是台宗弘和尚化進公有功和尚以戒壇院及唐禪院讓于法進大僧都即為戒壇第二和上天台教觀二代弘之華嚴宗人登此寶壇受具足戒及三聚戒即得成就十玄六相四種法界舉一全收相即相入主伴具足重重無盡通別二門深廣戒法三論宗人此壇受戒即得成就依名入實甚深因緣見道無得無方圓戒普遍周通微妙自在法相宗人受此戒法通包三聚盡未來際一一戒具三聚戒義律儀一戒全同諸律本自應理周遍圓實真言行者登此壇上受具戒者即成祕密金剛不壞勝義行願三摩地壇五相成身四重曼荼六大相應佛性圓體唐招提寺豐安僧正戒律宗旨云此戒或名三摩耶戒或名金剛戒或名佛性戒已上三摩耶戒即三聚法金剛寶戒及佛性戒即梵網中三聚通名俱舍成實隨入法相三論兩宗隨應依學大乘學人傍知小宗日本自昔唯有大乘學人行者本自無有小乘行人豐安戒律宗旨中云問大小二教律宗何攝答惣束諸戒學以為一宗之於我朝唯有菩薩律師元來無為偏執局見小乘故四分律亦義大乘故宣律師四分律鈔中教授云發上品心言上品心者斷一切惡修一切善度一切衆生成佛從初迄今壇上師僧教授詞句在於兹也故戒律云所說諸功德皆共成佛道又若有自為身欲求於佛道當尊重禁戒此是諸佛教已上此中意云總取一切大小二藏所說戒學以為一宗菩薩廣大之心總攝一切法故以此國都無偏局小者故縱學四分小乘毗尼此亦都非偏小之教分通上乘義鄰大極況非止此通大之教梵網極乘金剛寶戒宏宗心地深遠者乎南山大師圓教域心以此為宅攝諸戒學皆會大乘竝契法性即同瑜伽惣集蘊積三聚廣大甚深戒藏問瑜伽所說云何圓教答天台大師判云彌勒以二番四悉壇造地持論通華嚴已上地持即是瑜伽菩薩地同本異譯所釋華嚴既說別圓二教能通地持瑜伽豈無圓教義乎今依圓教成立宗義頓入圓人不用開會經小乘者必用開會法華唯被經小之者是故必用開三顯一頓大行者唯是應用法華所入不應強同小乘須開顯之者鑒真和尚傳戒已來以臨壇和上為律宗緒七大諸寺律師以戒﨟為任次第其事永代于今不絶至習學律藏者雖諸寺有律宗唐招提寺自昔相續鳥羽天皇御宇保安三年壬寅中川實範大德造戒壇式中興戒律之時即彼上人往招提寺傳受戒律自爾已來宗緒繼續鑒真和尚天平寶字三年己亥建唐招提寺安置佛舍利以持戒力鎮護國家即嘗地味知律法久住弘法礪律疏并定賓記南山律宗等和尚在世任法務大僧都并僧正圓寂之後贈大僧正焉天平寶字七年癸卯五月六日入滅春秋七十六和尚以招提寺付如寶法載義靜三人三人同心勸人造寺講學律法橫竪繁昌和尚有十一人門輩各有從屬互燃一燈枝流繁廣不可勝計且如寶小僧都弟子有豐安贈僧正豐安弟子有道淨律師道淨授律法于仁階大德仁階授之真空大德如此六代次第而來又鑒真如寶豐安圓勝豐慧安康如是六代又鑒真法載真璟戒勝壽高增恩安談喜寬如是八代傳持而來此時即至人王第六十一代朱雀天皇御宇承平元辛卯自爾已後住持寺院繼續律法宗緒不絶橫竪甚多而其名行不記于世人名難知雖然習學不絶宗裔相續自承平辛卯至第七十四代鳥羽天皇御宇大仁元年戊子經一百七十八年不知宗緒人名厥後實範授于菩提院藏俊贈僧正俊公授于覺憲僧正覺憲授于貞慶上人貞慶授之于戒如覺真乘心等戒如授之于不空院圓晴大德唐招提寺覺盛大德等此等中古戒律相承皆是學解傳持不絶其後第八十六代四條天皇御宇嘉禎二年丙申圓晴覺盛慈禪睿尊四德自誓受戒三聚通受自爾已來如法持戒如教持律次第相承充滿諸方不可知數北洛泉涌不可棄法師入宋傳律四般弘律南北多端恐繁不陳天台宗昔人王第四十六代孝謙天皇御宇天平勝寶六年甲午鑒真和尚齎天台宗章疏而來謂摩訶止觀法華玄義法華文句小止觀六妙門等也和尚門人法進曇靜思託如寶等竝天台宗學者也道璿律師亦學天台鑒真和尚在唐之時湛然法師記章未作然公天寶元年壬午年三十二出家同八年己丑三十九受具足戒當日本國天平勝寶元年己丑然公自俗習天台教鑒真年五十六天寶二年癸未進發日本故湛然師雖學台教未施記述鑒真不及齎持來朝傳教大師作天台付法緣起三卷其中列道璿鑒真并其門人法進等為弘天台之匠故彼文云大福律師先入和國乃傳圓明利益有情白塔僧統後遊日本復傳圓義開佛知見所以大安唐律注戒經於此蘇東大僧統注梵網於唐院兩聖用心弘天台義群生同欽天上甘露已上餘如彼明鑒真和尚既傳台宗于此國而未廣講敷先弘戒律故從勝寶六年甲午至第五十代日本根子皇統彌照桓武天皇御宇延曆二十三年甲申經五十一年當大唐貞元二十年甲申此年傳教大師奉詔入唐即謁天台山國清寺道邃和尚受學天台宗又隨佛隴寺行滿座主學台宗教遇順曉和尚傳受真言教亦值道邃受菩薩戒延曆二十四年乙酉八月歸朝厥時天台教觀妙樂諸記餘師記述皆傳無遺然傳教大師入唐已前獲鑒真和尚將來天台教觀諸文研精洞核方講三大部一遍已畢亦更講之至半未畢其後入唐值師受之歸朝之後弘之比睿山名延曆寺傳教大師諱最澄延曆四年乙丑年甫十九初住睿山作建興務七年戊辰建立中堂大唐之人名之日本天台山大師延曆十六年丁丑齡三十一天心有感預內供奉例以近江正稅充山供料大師發願寫一切經論章疏等弟子經珍睿勝光仁等皆俱助寫又差經藏妙勝等於七大寺勸經生之供大安寺僧聞最於龍淵寺大安寺別院助成此願衆僧傾鉢添經生供事果卷成延曆二十年辛巳最澄年三十五請七大寺英哲勝猷奉基寵忍賢玉光證觀敏慈詰安福玄耀等十大德於比睿峰一乘止觀院修法華十講自此後代每年無闕同二十一年壬午正月十九日朝議大夫和氣朝臣弘世於高雄山延請七大寺高僧善議勝猷奉基寵忍賢玉安福勤操修圓慈詰玄耀歲光道證光證觀敏等十餘大德講演天台法門天皇下勑睿感是深日本開天台會乃此為初此年所講即止觀玄義文句也大師此年初蒙渡海宣旨大師弘天台於睿山門人極多俱學台教弘仁十三年壬寅六月四日入滅春秋五十六先三十八渡海入唐歸朝興宗一十八年弘仁十四年二月九日依勑宣改睿峰一乘止觀院之名賜延曆寺名額貞觀七年乙酉十一月依圓珍小僧都之奏贈號傳教大師遷化之後經四十四年天台初傳鑒真和尚入唐傳之大興此宗者傳教大師是其力也山門本願號為始祖有義真和尚元是大安寺與傳教師同住彼寺與傳教同入唐同時學法俱歸本朝同興睿山為睿峰第一座首奉勑詔撰天台法華宗義集一卷於延曆寺立菩薩戒壇傳教之時雖有奏聞七大寺三綱訴訟不許天長十年癸丑七月四日入寂春秋七十七諸徒仰德號修禪大師仍次本願大師為台教宗緒圓澄大德傳教上足研精台宗大獲玄奧天長十年癸丑任第二座首光定圓仁竝傳教神足光定緇素崇敬號別當大師圓仁阿闍梨後贈號為慈覺大師慈覺承和五年戊午年四十五入唐學法更習天台大學真言在唐學法十年仁明天皇御宇承和十四年丁卯歸朝厥後經十八年大弘顯密二宗傳教大師初傳密教慈覺大師更傳真言山門真言慈覺所傳後代繁昌橫竪弘興清和天皇御宇貞觀六年甲申圓仁入滅春秋七十一夏﨟四十九明年乙酉傳教慈覺俱贈大師號金剛頂經蘇悉地經各製七卷疏現行于世次有圓珍阿闍梨是義真和尚上足精詳宗旨該博包攝第五十五代文德天皇御宇仁壽三年癸酉入唐學法于時年四十當唐大中七年癸酉隨良諿考諿恐諝和尚受學台宗隨般若怛羅三藏法詮阿闍梨慧輪阿闍梨同受祕教盡兩部玄奧在唐學法六年天安二年戊寅歸朝厥後三十四年弘通顯密達興真俗第五十九代宇多天皇御宇寬平三年辛亥遷化春秋七十八贈號智證大師智證弟子有增命良基康濟猷憲等各研教觀橫竪流通智證門人皆在睿山弘通宗旨號山王院門流是也後遷園城寺盛弘通顯密寺門天台別有相承慈覺門人學侶極多慧亮安慧遍昭長意相應等也安慧授法于安然然公亦承慈覺慧亮弟子有滿賀賀公弟子有良源號慈慧大僧正慈慧門人有源信覺運兩哲如次慧心檀那兩德後代各立門徒乃此兩德門流慧心僧都門人有寬印覺超等又皇覺範源者慧心之清流永辨智海者檀那之榮葉俱流名於遐邇飛威於遠近證真靜嚴竝肩耀法光顯真明禪繼踵踏教迹天台座首為宗重職法緒曆焉繼續無窮真言宗真言教法東流傳來濫觴由漸事非一途昔人王第四十四代元正天皇御宇養老二年戊午道慈律師從唐歸朝在唐一十八年習學六宗三論為本入唐已前隨義淵僧正學法相宗在唐六宗真言隨一求聞持法特所精詳自行化他啻以此法或云道慈隨智鳳受求聞持法而年代可考道慈以真言法授善議慶俊議公授之于勤操僧正勤操授求聞持法于弘法大師大師入唐已前於阿州大龍寺土州室戶崎等行聞持法道慈於唐隨善無畏三藏受學真言開元四年善無畏來同六年戊午道慈還日本三箇年中於唐傳受善無畏來大唐初譯虛空藏求聞持法開元十二年甲子已前譯大日經并蘇婆呼蘇悉地經三藏譯大日經為弟子一行開講敷演一行隨講聞即記録此間定經年月日時隨講結集成一經疏有二十卷然一行禪師開元十五年奄卒無畏其後應來日域久目東邊立一基塔三年之後還于大唐三藏於大唐國奄焉物故年九十九三藏裹玉而來根機未熟納經安塔于後弘法大師具感靈夢即往彼寺獲大日經以此緣故有入唐志善無畏三藏來朝之年雖無記録應是聖武天皇御宇神龜季曆天平初運此數年間弘法大師延曆二十三年甲申越海入唐遇青龍寺慧果阿闍梨兩部大法祕藏奧旨窮究淵府傳受已畢平城天皇御宇大同元年丙戌歸朝歸朝之年當大唐第九主德宗皇帝貞元二十二年丙戌大師年三十三比睿傳教大師與弘法同船入唐彼學天台教觀兼傳真言即值順教和尚傳受兩部祕法明年延曆乙酉歸朝天台教觀并真言教弘之睿嶽弘法大師專學真言傳多祕藏歸朝弘通普天歸宗諸方傳受自爾已來諸德間出越海求異各傳密乘歸朝弘之古來諸德入唐傳密前後連續總有八家一傳教大師二弘法大師三小栗常曉和尚四靈巖寺圓行和尚五睿嶽慈覺大師六安祥寺慧運大僧都七睿嶽智證大師後名三井寺八圓覺寺宗睿僧正名之惣為八家真言雖有八家朝宗所歸不過東寺天台兩流傳教慈覺智證三流竝是天台餘皆東寺然所立義途所歸奧旨孤絶獨步達興高卓唯是弘法大師所傳東寺真言所趣而已依大日經菩提心論等立十住心攝一切教所立真言大超顯宗出萃孤標極祕深奧弘法大師興祕宗時顯教諸宗或有敵論或有對談大師直現祥瑞顯覺頓極諸宗信伏無敢措言弘法大師承和二年乙卯三月二十一日於高野山入定受法弟子有若干人各研祕藏橫竪流演第三世下頓分小野廣澤兩流乃益信聖寶兩哲其人也至于後代漸出派流燈燈相承流流互潤各播威肅俱彰靈德諸流義途衆門理致所立非一所說是多非可具陳豈言盡哉上來略陳八宗所傳之緣起竟然震旦國弘通禪法是達磨大師所傳宗旨也道璿律師傳北宗禪授之大安寺行表和尚行表授之傳教大師傳教受之弘于睿山南宗禪法昔未傳之近代禪師或從唐而來此或從此而往還皆是南宗其事甚多非可數盡震旦諸師弘淨土法日本先德不立為宗諸宗先哲各隨自宗立義陳宗弘通而已近代源空上人已後立淨土宗弘通世間空公門人各立徒屬義途極多破立無窮其事繁廣不能具陳若加此二應是十宗佛法旨歸無過此數功業不虛必成二利而已于時應長元年辛亥七月五日於東大寺戒檀院述之華嚴宗沙門凝然春秋七十二造此三國佛法緣起三卷奉為睿覽獻上大覺寺法皇御所于此御所睿感以此草本最初寫之畢沙門凝然造此佛法緣起并十重唯識瓊鑑章一卷心要義鑑一卷進覽之其中十重唯識者奉勑命於御前委細講讀之了彼十重唯識之後顯示華嚴宗義諸門八十餘科法門長行問答略釋後舉偈頌頌有八十五條八十三頌皆綴四韻於中二頌五言四韻唯識惣結八韻述懷四句二韻愚草遊心頌百首之內抽出八十三頌載之心王等五種唯識本覺業等九相及三祇頌合十七條不載之彼載列諸頌瓊鑑唯一本書在法皇御所而已戒壇示觀律師學該乎三藏智辨汗瀾焉空有性相猶庖丁之於牛也且所遺之心畫凡千有餘卷焉然不出卷而投諸宗之閫域知三國之傳通者莫若乎斯書也苟從事于此者豈不云乎回千里之迷途者一呼之力也不遇於斯說則吾終昧於大方者邪所恨未約刊行所利不廣仍命工鋟板云爾應永己卯年正月日三國佛法傳通緣起卷下終
